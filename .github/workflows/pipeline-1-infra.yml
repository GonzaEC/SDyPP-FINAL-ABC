name: "Pipeline 1 - Infraestructura GKE"

on:
  push:
    branches: [main]
    paths: ["infra/**"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  gitleaks:
    uses: ./.github/workflows/gitleaks.yml

  tofu:
    name: OpenTofu Plan & Apply
    needs: gitleaks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - uses: opentofu/setup-opentofu@v1

      - name: Init
        run: tofu init

      - name: Plan
        run: tofu plan -var="project_id=${{ secrets.GCP_PROJECT_ID }}" -out=plan.tfplan

      - name: Apply
        run: tofu apply plan.tfplan
