name: "Pipeline 4 - Workers GPU (Cluster Profesor)"

on:
  push:
    branches: [main]
    paths:
      - "Pilar2/P5/worker.py"
      - "Pilar2/P5/gpu-server.py"
      - "Pilar2/P5/brute_force_range.cu"
      - "Pilar2/P5/Dockerfile.worker"
      - "k8s/profesor/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  REGION: us-central1
  REPO: sdypp

jobs:
  gitleaks:
    uses: ./.github/workflows/gitleaks.yml

  build-gpu-image:
    name: Build GPU Worker Image
    needs: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push GPU worker image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/blockchain-worker-gpu"
          docker build -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:latest" \
            -f Pilar2/P5/Dockerfile.worker Pilar2/P5/
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

  deploy-profesor:
    name: Deploy to Profesor Cluster
    needs: build-gpu-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROFESOR }}" | base64 -d > ~/.kube/config

      - name: Update image tags and deploy
        run: |
          REGISTRY="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}"
          cd k8s/profesor

          sed -i "s|image: IMAGE_TAG|image: ${REGISTRY}/blockchain-worker-gpu:${{ github.sha }}|" gpu-server-deployment.yaml
          sed -i "s|image: IMAGE_TAG|image: ${REGISTRY}/blockchain-worker-gpu:${{ github.sha }}|" worker-deployment.yaml

          kubectl apply -f .
