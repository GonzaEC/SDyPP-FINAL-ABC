services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: entradas
      POSTGRES_PASSWORD: entradas
      POSTGRES_DB: entradas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entradas -d entradas"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* se inlinean en build time, por eso van acá y no en environment.
        NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME:-}
        NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: ${NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://entradas:entradas@postgres:5432/entradas
      SESSION_PASSWORD: ${SESSION_PASSWORD:-dev-only-change-me-please-this-must-be-at-least-32-characters-long}
      NCT_URL: ${NCT_URL:-mock}
      NCT_MOCK_DELAY_MIN_MS: ${NCT_MOCK_DELAY_MIN_MS:-1500}
      NCT_MOCK_DELAY_MAX_MS: ${NCT_MOCK_DELAY_MAX_MS:-4500}
      NCT_MOCK_FAILURE_RATE: ${NCT_MOCK_FAILURE_RATE:-0}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_PUBLIC_URL: ${MP_PUBLIC_URL:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  postgres_data:
